name: Release
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: write

jobs:
  GoReleaser:
    runs-on: "namespace-profile-linux-amd64-4vcpu"
    steps:
      - uses: 'namespacelabs/nscloud-checkout-action@v9'
        with:
          fetch-depth: 0
      - name: Setup Env
        uses: ./.github/actions/default
        with:
          token: ${{ secrets.NUMARY_GITHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: "NumaryBot"
          password: ${{ secrets.NUMARY_GITHUB_TOKEN }}
      - uses: namespacelabs/nscloud-setup-buildx-action@v0
      - name: Download Go modules
        shell: bash
        run: nix develop --impure --command go mod download
      - run: >
          nix --extra-experimental-features "nix-command" --extra-experimental-features "flakes"
          develop --impure --command just release
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.NUMARY_GITHUB_TOKEN }}
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Add the OpenAPI file to the release assets
        run: >
          gh release upload ${{github.ref_name}} ./openapi.yaml#openapi.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
