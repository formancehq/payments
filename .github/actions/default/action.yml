name: Setup Env
description: Setup Env for Linux x64
inputs:
  token:
    description: 'A Github PAT'
    required: true
  nscloud-cache:
    description: 'Enable Namespace.so Git caching (requires namespace-profile-* runner)'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
    - name: Load dependencies
      shell: bash
      run: nix develop --install
    - name: Go environment
      id: go-env
      shell: bash
      run: |
        echo "GOCACHE=$(nix develop --impure --command go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "GOMODCACHE=$(nix develop --impure --command go env GOMODCACHE)" >> $GITHUB_OUTPUT
    - uses: namespacelabs/nscloud-cache-action@v1
      if: inputs.nscloud-cache != 'false'
      with:
        path: |
          ${{ steps.go-env.outputs.GOCACHE }}
          ${{ steps.go-env.outputs.GOMODCACHE }}
