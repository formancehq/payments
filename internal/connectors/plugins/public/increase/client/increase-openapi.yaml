security:
- bearerAuth: []
servers:
- url: https://api.increase.com
- url: https://sandbox.increase.com
tags:
- description: Accounts are your bank accounts with Increase. They store money, receive
    transfers, and send payments. They earn interest and have depository insurance.
  name: Accounts
- description: Each account can have multiple account and routing numbers. We recommend
    that you use a set per vendor. This is similar to how you use different passwords
    for different websites. Account numbers can also be used to seamlessly reconcile
    inbound payments. Generating a unique account number per vendor ensures you always
    know the originator of an incoming payment.
  name: Account Numbers
- description: Cards are commercial credit cards. They'll immediately work for online
    purchases after you create them. All cards maintain a credit limit of 100% of
    the Account’s available balance at the time of transaction. Funds are deducted
    from the Account upon transaction settlement.
  name: Cards
- description: Card Payments group together interactions related to a single card
    payment, such as an authorization and its corresponding settlement.
  name: Card Payments
- description: Additional information about a card purchase (e.g., settlement or refund),
    such as level 3 line item data.
  name: Card Purchase Supplements
- description: If unauthorized activity occurs on a card, you can create a Card Dispute
    and we'll return the funds if appropriate.
  name: Card Disputes
- description: Custom physical Visa cards that are shipped to your customers. The
    artwork is configurable by a connected [Card Profile](/documentation/api#card-profiles).
    The same Card can be used for multiple Physical Cards. Printing cards incurs a
    fee. Please contact [support@increase.com](mailto:support@increase.com) for pricing!
  name: Physical Cards
- description: This contains artwork and metadata relating to a Card's appearance
    in digital wallet apps like Apple Pay and Google Pay. For more information, see
    our guide on [digital card artwork](https://increase.com/documentation/card-art).
  name: Digital Card Profiles
- description: This contains artwork and metadata relating to a Physical Card's appearance.
    For more information, see our guide on [physical card artwork](https://increase.com/documentation/card-art-physical-cards).
  name: Physical Card Profiles
- description: A Digital Wallet Token is created when a user adds a Card to their
    Apple Pay or Google Pay app. The Digital Wallet Token can be used for purchases
    just like a Card.
  name: Digital Wallet Tokens
- description: Transactions are the immutable additions and removals of money from
    your bank account. They're the equivalent of line items on your bank statement.
  name: Transactions
- description: Pending Transactions are potential future additions and removals of
    money from your bank account.
  name: Pending Transactions
- description: Declined Transactions are refused additions and removals of money from
    your bank account. For example, Declined Transactions are caused when your Account
    has an insufficient balance or your Limits are triggered.
  name: Declined Transactions
- description: Account transfers move funds between your own accounts at Increase.
  name: Account Transfers
- description: ACH transfers move funds between your Increase account and any other
    account accessible by the Automated Clearing House (ACH).
  name: ACH Transfers
- description: ACH Prenotifications are one way you can verify account and routing
    numbers by Automated Clearing House (ACH).
  name: ACH Prenotifications
- description: An Inbound ACH Transfer is an ACH transfer initiated outside of Increase
    to your account.
  name: Inbound ACH Transfers
- description: Wire transfers move funds between your Increase account and any other
    account accessible by Fedwire.
  name: Wire Transfers
- description: An Inbound Wire Transfer is a wire transfer initiated outside of Increase
    to your account.
  name: Inbound Wire Transfers
- description: Wire drawdown requests enable you to request that someone else send
    you a wire. This feature is in beta; reach out to [support@increase.com](mailto:support@increase.com)
    to learn more.
  name: Wire Drawdown Requests
- description: Inbound wire drawdown requests are requests from someone else to send
    them a wire. This feature is in beta; reach out to [support@increase.com](mailto:support@increase.com)
    to learn more.
  name: Inbound Wire Drawdown Requests
- description: Check Transfers move funds from your Increase account by mailing a
    physical check.
  name: Check Transfers
- description: Inbound Check Deposits are records of third-parties attempting to deposit
    checks against your account.
  name: Inbound Check Deposits
- description: Real-Time Payments transfers move funds, within seconds, between your
    Increase account and any other account on the Real-Time Payments network.
  name: Real-Time Payments Transfers
- description: An Inbound Real-Time Payments Transfer is a Real-Time Payments transfer
    initiated outside of Increase to your account.
  name: Inbound Real-Time Payments Transfers
- description: Check Deposits allow you to deposit images of paper checks into your
    account.
  name: Check Deposits
- description: Lockboxes are physical locations that can receive mail containing paper
    checks. Increase will automatically create a Check Deposit for checks received
    this way.
  name: Lockboxes
- description: Inbound Mail Items represent pieces of physical mail delivered to a
    Lockbox.
  name: Inbound Mail Items
- description: Routing numbers are used to identify your bank in a financial transaction.
  name: Routing Numbers
- description: External Accounts represent accounts at financial institutions other
    than Increase. You can use this API to store their details for reuse.
  name: External Accounts
- description: Entities are the legal entities that own accounts. They can be people,
    corporations, partnerships, government authorities, or trusts.
  name: Entities
- description: Supplemental Documents are uploaded files connected to an Entity during
    onboarding.
  name: Supplemental Documents
- description: Programs determine the compliance and commercial terms of Accounts.
    By default, you have a Commercial Banking program for managing your own funds.
    If you are lending or managing funds on behalf of your customers, or otherwise
    engaged in regulated activity, we will work together to create additional Programs
    for you.
  name: Programs
- description: A request for proof of authorization for one or more ACH debit transfers.
  name: Proof of Authorization Requests
- description: Information submitted in response to a proof of authorization request.
    Per Nacha's guidance on proof of authorization, the originator must ensure that
    the authorization complies with applicable legal requirements, is readily identifiable
    as an authorization, and has clear and readily understandable terms.
  name: Proof of Authorization Request Submissions
- description: Account Statements are generated monthly for every active Account.
    You can access the statement's data via the API or retrieve a PDF with its details
    via its associated File.
  name: Account Statements
- description: Files are objects that represent a file hosted on Increase's servers.
    The file may have been uploaded by you (for example, when uploading a check image)
    or it may have been created by Increase (for example, an autogenerated statement
    PDF).
  name: Files
- description: Increase generates certain documents / forms automatically for your
    application; they can be listed here.
  name: Documents
- description: Exports are batch summaries of your Increase data. You can make them
    from the API or dashboard. Since they can take a while, they are generated asynchronously.
    We send a webhook when they are ready. For more information, please read our [Exports
    documentation](https://increase.com/documentation/exports).
  name: Exports
- description: Events are records of things that happened to objects at Increase.
    Events are accessible via the List Events endpoint and can be delivered to your
    application via webhooks. For more information, see our [webhooks guide](https://increase.com/documentation/webhooks).
  name: Events
- description: Webhooks are event notifications we send to you by HTTPS POST requests.
    Event Subscriptions are how you configure your application to listen for them.
    You can create an Event Subscription through your [developer dashboard](https://dashboard.increase.com/developers/webhooks)
    or the API. For more information, see our [webhooks guide](https://increase.com/documentation/webhooks).
  name: Event Subscriptions
- description: Real Time Decisions are created when your application needs to take
    action in real-time to some event such as a card authorization. For more information,
    see our [Real-Time Decisions guide](https://increase.com/documentation/real-time-decisions).
  name: Real-Time Decisions
- description: Accounts are T-accounts. They can store accounting entries. Your compliance
    setup might require annotating money movements using this API. Learn more in our
    [guide to Bookkeeping](https://increase.com/documentation/bookkeeping#bookkeeping).
  name: Bookkeeping Accounts
- description: Entry Sets are accounting entries that are transactionally applied.
    Your compliance setup might require annotating money movements using this API.
    Learn more in our [guide to Bookkeeping](https://increase.com/documentation/bookkeeping#bookkeeping).
  name: Bookkeeping Entry Sets
- description: Entries are T-account entries recording debits and credits. Your compliance
    setup might require annotating money movements using this API. Learn more in our
    [guide to Bookkeeping](https://increase.com/documentation/bookkeeping#bookkeeping).
  name: Bookkeeping Entries
- description: Groups represent organizations using Increase. You can retrieve information
    about your own organization via the API. More commonly, OAuth platforms can retrieve
    information about the organizations that have granted them access. Learn more
    about OAuth [here](https://increase.com/documentation/oauth).
  name: Groups
- description: An OAuth Application lets you build an application for others to use
    with their Increase data. You can create an OAuth Application via the Dashboard
    and read information about it with the API. Learn more about OAuth [here](https://increase.com/documentation/oauth).
  name: OAuth Applications
- description: When a user authorizes your OAuth application, an OAuth Connection
    object is created. Learn more about OAuth [here](https://increase.com/documentation/oauth).
  name: OAuth Connections
- description: A token that is returned to your application when a user completes
    the OAuth flow and may be used to authenticate requests. Learn more about OAuth
    [here](/documentation/oauth).
  name: OAuth Tokens
- description: IntraFi is a [network of financial institutions](https://www.intrafi.com/network-banks)
    that allows Increase users to sweep funds to multiple banks, in addition to Increase's
    main bank partners. This enables accounts to become eligible for additional Federal
    Deposit Insurance Corporation (FDIC) insurance. An IntraFi Account Enrollment
    object represents the status of an account in the network. Sweeping an account
    to IntraFi doesn't affect funds availability.
  name: IntraFi Account Enrollments
- description: When using IntraFi, each account's balance over the standard FDIC insurance
    amount are swept to various other institutions. Funds are rebalanced across banks
    as needed once per business day.
  name: IntraFi Balances
- description: Certain institutions may be excluded per Entity when sweeping funds
    into the IntraFi network. This is useful when an Entity already has deposits at
    a particular bank, and does not want to sweep additional funds to it. It may take
    5 business days for an exclusion to be processed.
  name: IntraFi Exclusions
- description: Real-Time Payments transfers move funds, within seconds, between your
    Increase account and any other account on the Real-Time Payments network. A request
    for payment is a request to the receiver to send funds to your account. The permitted
    uses of Requests For Payment are limited by the Real-Time Payments network to
    business-to-business payments and transfers between two accounts at different
    banks owned by the same individual. Please contact [support@increase.com](mailto:support@increase.com)
    to enable this API for your team.
  name: Real-Time Payments Request for Payments
