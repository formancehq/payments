            maximum) is 100 objects.
          minimum: 1
          type: integer
      - in: query
        name: account_id
        required: false
        schema:
          description: Filter Declined Transactions to ones belonging to the specified
            Account.
          type: string
      - in: query
        name: created_at.after
        required: false
        schema:
          description: Return results after this [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)
