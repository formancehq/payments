          format: date-time
          type: string
      - in: query
        name: route_id
        required: false
        schema:
          description: Filter Declined Transactions to those belonging to the specified
            route.
          type: string
      - in: query
        name: category.in
        required: false
        schema:
          description: Return results whose value is in the provided list. For GET
            requests, this should be encoded as a comma-delimited string, such as
            `?in=one,two,three`.
          items:
            enum:
            - ach_decline
            - card_decline
            - check_decline
            - inbound_real_time_payments_transfer_decline
            - wire_decline
            - check_deposit_rejection
            - other
            type: string
            x-enum-descriptions:
            - 'ACH Decline: details will be under the `ach_decline` object.'
            - 'Card Decline: details will be under the `card_decline` object.'
            - 'Check Decline: details will be under the `check_decline` object.'
            - 'Inbound Real-Time Payments Transfer Decline: details will be under
              the `inbound_real_time_payments_transfer_decline` object.'
            - 'Wire Decline: details will be under the `wire_decline` object.'
            - 'Check Deposit Rejection: details will be under the `check_deposit_rejection`
              object.'
            - The Declined Transaction was made for an undocumented or deprecated
              reason.
          type: array
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/declined_transaction_list"
          description: Declined Transaction List
        default:
          content:
