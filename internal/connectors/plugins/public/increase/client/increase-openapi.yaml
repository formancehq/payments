openapi: 3.1.0
info:
  title: Increase connector API
  version: 0.0.1
paths:
  "/account_transfers":
    get:
      operationId: list_account_transfers
      parameters:
      - in: query
        name: cursor
        required: false
        schema:
          description: Return the page of entries after this one.
          type: string
      - in: query
        name: limit
        required: false
        schema:
          description: Limit the size of the list that is returned. The default (and
            maximum) is 100 objects.
          minimum: 1
          type: integer
      - example: account_in71c4amph0vgo2qllky
        in: query
        name: account_id
        required: false
        schema:
          description: Filter Account Transfers to those that originated from the
            specified Account.
          type: string
      - in: query
        name: idempotency_key
        required: false
        schema:
          description: Filter records to the one with the specified `idempotency_key`
            you chose for that object. This value is unique across Increase and is
            used to ensure that a request is only processed once. Learn more about
            [idempotency](https://increase.com/documentation/idempotency-keys).
