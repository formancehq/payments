  "/declined_transactions":
    get:
      operationId: list_declined_transactions
      parameters:
      - in: query
        name: cursor
        required: false
        schema:
          description: Return the page of entries after this one.
          type: string
      - in: query
        name: limit
        required: false
        schema:
