      summary: Update an Account
      x-sandbox-only: false
      x-tag: Accounts
  "/accounts/{account_id}/balance":
    get:
      description: Retrieve the current and available balances for an account in minor
        units of the account's currency. Learn more about [account balances](/documentation/balance).
      operationId: retrieve_an_account_balance
      parameters:
      - example: account_in71c4amph0vgo2qllky
        in: path
        name: account_id
        required: true
        schema:
          description: The identifier of the Account to retrieve.
          type: string
      - in: query
        name: at_time
        required: false
        schema:
          description: The moment to query the balance at. If not set, returns the
            current balances.
          format: date-time
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
