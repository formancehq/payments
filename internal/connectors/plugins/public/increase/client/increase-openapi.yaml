            application/json:
              schema:
                "$ref": "#/components/schemas/error"
          description: Error
      summary: List Accounts
      x-sandbox-only: false
      x-tag: Accounts
    post:
      operationId: create_an_account
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/create_an_account_parameters"
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/account"
          description: Account
        default:
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
          description: Error
      summary: Create an Account
      x-sandbox-only: false
      x-tag: Accounts
  "/accounts/{account_id}":
    get:
      operationId: retrieve_an_account
      parameters:
      - example: account_in71c4amph0vgo2qllky
        in: path
        name: account_id
        required: true
        schema:
          description: The identifier of the Account to retrieve.
