# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
project_name: payments

nightly:
  version_template: '{{ .FullCommit }}'
  publish_release: false

checksum:
  name_template: '{{.ProjectName}}_checksums.txt'

snapshot:
  version_template: "{{ .Version }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^spec:'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: Other work
      order: 999

builds:
  - binary: payments
    id: payments-ce
    ldflags:
      - -X github.com/formancehq/payments/cmd.BuildDate={{ .Date }}
      - -X github.com/formancehq/payments/cmd.Version=v{{ .Version }}
      - -X github.com/formancehq/payments/cmd.Commit={{ .ShortCommit }}
      - -X github.com/formancehq/payments/cmd.Edition=community
      - -extldflags "-static"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - binary: payments
    id: payments-ee
    tags:
      - ee
    ldflags:
      - -X github.com/formancehq/payments/cmd.BuildDate={{ .Date }}
      - -X github.com/formancehq/payments/cmd.Version=v{{ .Version }}
      - -X github.com/formancehq/payments/cmd.Commit={{ .ShortCommit }}
      - -X github.com/formancehq/payments/cmd.Edition=enterprise
      - -extldflags "-static"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: payments-ce
    ids:
      - payments-ce
    formats:
      - tar.gz
    name_template: "{{.ProjectName}}_{{.Os}}-{{.Arch}}"

  - id: payments-ee
    ids:
      - payments-ee
    formats:
      - tar.gz
    name_template: "{{.ProjectName}}-ee_{{.Os}}-{{.Arch}}"

dockers:
  # CE - build.Dockerfile amd64
  - image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"
    ids:
      - payments-ce
    goarch: amd64
    dockerfile: build.Dockerfile
    use: buildx
    build_flag_templates:
      - --provenance=false
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.url=https://github.com/formancehq/{{ .ProjectName }}
      - --label=org.opencontainers.image.source=https://github.com/formancehq/{{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
  # CE - build.Dockerfile arm64
  - image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"
    ids:
      - payments-ce
    goarch: arm64
    dockerfile: build.Dockerfile
    use: buildx
    build_flag_templates:
      - --provenance=false
      - --platform=linux/arm64/v8
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.url=https://github.com/formancehq/{{ .ProjectName }}
      - --label=org.opencontainers.image.source=https://github.com/formancehq/{{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
  # CE - scratch.Dockerfile amd64
  - image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64-scratch"
    ids:
      - payments-ce
    goarch: amd64
    dockerfile: scratch.Dockerfile
    use: buildx
    build_flag_templates:
      - --provenance=false
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.url=https://github.com/formancehq/{{ .ProjectName }}
