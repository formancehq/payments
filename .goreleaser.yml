docker_manifests:
  # CE - versioned
  - name_template: "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"
  # CE - latest
  - name_template: "{{ if not .IsNightly }}{{ if not .Prerelease }}ghcr.io/formancehq/{{ .ProjectName }}:latest{{ end }}{{ end }}"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"
  # CE - scratch
  - name_template: "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-scratch"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64-scratch"
      - "ghcr.io/formancehq/{{ .ProjectName }}:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64-scratch"

  # EE - versioned
  - name_template: "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"
  # EE - latest
  - name_template: "{{ if not .IsNightly }}{{ if not .Prerelease }}ghcr.io/formancehq/{{ .ProjectName }}-ee:latest{{ end }}{{ end }}"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64"
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64"
  # EE - scratch
  - name_template: "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-scratch"
    image_templates:
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-amd64-scratch"
      - "ghcr.io/formancehq/{{ .ProjectName }}-ee:{{ if not .IsNightly }}v{{ end }}{{ .Version }}-arm64-scratch"

release:
  prerelease: auto
  footer: |
    ## What to do next?
    - Read the [documentation](https://docs.formance.com/)
    - Join our [GitHub Discussions](https://github.com/orgs/formancehq/discussions)
